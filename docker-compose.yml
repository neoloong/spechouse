services:
  db:
    image: postgis/postgis:16-3.4
    container_name: spechouse_db
    environment:
      POSTGRES_USER: spechouse
      POSTGRES_PASSWORD: spechouse
      POSTGRES_DB: spechouse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spechouse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
